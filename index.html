<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Surprise For Adiee ❤️</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<audio id="music" loop>
    <source src="Pictures/song.mp3" type="audio/mp3">
</audio>



<!-- LOCK SCREEN -->

<div id="lockScreen">

    <h1>
        A Special Surprise
        <br>
        For Adiee ❤️
    </h1>


    <input 
    id="password"
    placeholder="Enter Password">


    <button onclick="unlock()">
        Open Surprise 💌
    </button>


</div>





<!-- MAIN CONTENT -->


<div id="main" class="hidden">


<h1>
    Hi Adiee ❤️
</h1>


<p class="subtitle">
    I made this just because I love you 🥰
</p>




<div class="container">


<div class="photo-section">


<img 
src="Pictures/p1.jpg"
class="myPhoto"
onclick="showReaction()">



<p>
Tap my photo 😳
</p>


</div>





<div class="reaction-box">


<h2>
My Reactions 😂
</h2>


<img 
id="reaction"
src="Pictures/g7.gif">


<p id="reactionText">
Waiting for you...
</p>


</div>


</div>






<div class="message">


<h2>
A Little Message ❤️
</h2>


<p>

Every moment with you is special.
I created this little surprise
to remind you that you are loved.

Thank you for being part of my life ❤️

</p>


</div>



</div>





<div id="hearts"></div>



<script src="script.js"></script>


</body>

</html>
